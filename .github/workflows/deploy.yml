name: Deploy

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
      - name: Install shop-api dependencies
        run: |
          cd apps/shop-api
          npm install
      - name: Install admin-api dependencies
        run: |
          cd apps/admin-api
          npm install
      - name: Install telegram-bot dependencies
        run: |
          cd apps/telegram-bot
          npm install
      - name: Deployment placeholder
        run: |
          echo "Deployment workflow is configured. Replace this with your actual deployment commands."
